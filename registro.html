    <main>
        <form action="/ruta" method="post">
            <fieldset>
                <legend>Registrarse</legend>
                <p>Por favor, rellena el siguiente formulario para registrarte en Conquer Blocks Academy.</p>
                <label for="nombre">Nombre Completo:</label><br>
                <input type="text" id="nombre" name="nombre" required>
                <br>
                <label for="nacimiento">Fecha de Nacimiento:</label><br>
                <input type="text" id="nacimiento" name="nacimiento" required>
                <br>
                <label for="email">Correo Electrónico:</label><br>
                <input type="email" id="email" name="email" required>
                <br>
                <label for="direccion">Direccion:</label><br>
                <textarea name="direccion" id="direccion" required cols="30" rows="5"></textarea>
                <br>
                <label for="pagina_web">Pagina Web:</label><br>
                <input type="url" id="pagina_web" name="pagina_web" required>
                <br>
                <label for="foto">Foto:</label><br>
                <input type="file" id="foto" name="foto" required>
                <br><br>
                <label for="biografia">Biografia:</label><br>
                <textarea name="biografia" id="biografia" required cols="30" rows="5"></textarea>
                <br>
                <button type="submit">Registrarse</button>
            </fieldset>
        </form>
